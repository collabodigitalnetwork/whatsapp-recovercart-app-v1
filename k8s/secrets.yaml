# This file contains secret templates for production deployment
# Replace placeholder values with actual secrets before applying

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: production
type: Opaque
stringData:
  database-url: "postgresql://username:password@postgres-service:5432/whatsapp_recovercart"
  redis-url: "redis://redis-service:6379"
  jwt-secret: "CHANGE_ME_IN_PRODUCTION_JWT_SECRET_256_BITS"
  encryption-key: "CHANGE_ME_IN_PRODUCTION_ENCRYPTION_KEY_256_BITS"

---
apiVersion: v1
kind: Secret
metadata:
  name: shopify-secrets
  namespace: production
type: Opaque
stringData:
  api-key: "YOUR_SHOPIFY_API_KEY"
  api-secret: "YOUR_SHOPIFY_API_SECRET"
  webhook-secret: "YOUR_SHOPIFY_WEBHOOK_SECRET"

---
apiVersion: v1
kind: Secret
metadata:
  name: whatsapp-secrets
  namespace: production
type: Opaque
stringData:
  api-token: "YOUR_WHATSAPP_API_TOKEN"
  phone-number-id: "YOUR_WHATSAPP_PHONE_NUMBER_ID"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: production
type: Opaque
stringData:
  username: "postgres"
  password: "CHANGE_ME_SECURE_POSTGRES_PASSWORD"
  readonly-password: "CHANGE_ME_READONLY_PASSWORD"
  analytics-password: "CHANGE_ME_ANALYTICS_PASSWORD"

---
# TLS Certificate for HTTPS (if using cert-manager)
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: production
type: kubernetes.io/tls
data:
  # Base64 encoded certificate and key
  # tls.crt: LS0tLS1CRUdJTi... (your certificate)
  # tls.key: LS0tLS1CRUdJTi... (your private key)

---
# External secrets operator configuration (if using AWS Secrets Manager, etc.)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: production
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
      auth:
        secretRef:
          accessKeyID:
            name: aws-credentials
            key: access-key-id
          secretAccessKey:
            name: aws-credentials
            key: secret-access-key

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-external-secrets
  namespace: production
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: app-secrets-from-aws
    creationPolicy: Owner
  data:
  - secretKey: database-url
    remoteRef:
      key: whatsapp-recovercart/production
      property: database_url
  - secretKey: jwt-secret
    remoteRef:
      key: whatsapp-recovercart/production
      property: jwt_secret
  - secretKey: encryption-key
    remoteRef:
      key: whatsapp-recovercart/production
      property: encryption_key